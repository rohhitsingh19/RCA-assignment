<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RCA Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 14px; color: #aaa; letter-spacing: 1px; }

    #session-info { font-size: 11px; color: #555; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .user {
      align-self: flex-end;
      background: #1e3a5f;
      color: #cce0ff;
      border: 1px solid #2a4a6f;
    }

    .agent {
      align-self: flex-start;
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #2a2a2a;
    }

    .agent.thinking {
      color: #555;
      font-style: italic;
    }

    .error {
      align-self: flex-start;
      background: #2a1010;
      color: #ff6b6b;
      border: 1px solid #5a2020;
    }

    #input-bar {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      background: #1a1a1a;
      border-top: 1px solid #333;
    }

    #user-input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 10px 12px;
      font-family: monospace;
      font-size: 13px;
      border-radius: 4px;
      resize: none;
      height: 44px;
    }

    #user-input:focus { outline: none; border-color: #555; }

    #send-btn {
      background: #1e3a5f;
      color: #cce0ff;
      border: 1px solid #2a4a6f;
      padding: 0 20px;
      font-family: monospace;
      font-size: 13px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { background: #254a78; }

    #new-session-btn {
      background: transparent;
      color: #555;
      border: 1px solid #333;
      padding: 4px 10px;
      font-family: monospace;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
    }

    #new-session-btn:hover { color: #aaa; border-color: #555; }

    /* Markdown-style formatting inside agent messages */
    .agent strong { color: #7eb8f7; }
    .agent code { background: #222; padding: 1px 4px; border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <h1>⚡ OR2A RCA AGENT</h1>
  <div style="display:flex;gap:12px;align-items:center;">
    <span id="session-info">starting session...</span>
    <button id="new-session-btn" onclick="initSession()">new session</button>
  </div>
</header>

<div id="chat-window"></div>

<div id="input-bar">
  <textarea
    id="user-input"
    placeholder="Ask about a store, city, or hour — e.g. 'How did Bangalore do on 2026-04-22?'"
    onkeydown="handleKey(event)"
  ></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  let sessionId = null;

  // ── Session ──────────────────────────────────────────────────────────────

  async function initSession() {
    clearChat();
    try {
      const res = await fetch("/session", { method: "POST" });
      const data = await res.json();
      sessionId = data.session_id;
      document.getElementById("session-info").textContent =
        "session: " + sessionId.slice(0, 8) + "...";
      appendMessage(
        "agent",
        "Hello! I'm the OR2A RCA Agent.\n\nI can help you:\n" +
        "• Check how a city or store performed\n" +
        "• Run root cause analysis on underperforming stores\n" +
        "• Drill into specific hours\n\n" +
        "Try: \"How did Bangalore do on 2026-04-22?\""
      );
    } catch (e) {
      appendMessage("error", "Failed to start session. Is the server running?");
    }
  }

  // ── Chat ─────────────────────────────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();
    if (!text || !sessionId) return;

    input.value = "";
    setLoading(true);

    appendMessage("user", text);
    const thinkingEl = appendMessage("agent thinking", "thinking...");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });

      const data = await res.json();
      thinkingEl.remove();

      if (data.error) {
        appendMessage("error", "Error: " + data.error);
      } else {
        appendMessage("agent", formatResponse(data.response));
      }
    } catch (e) {
      thinkingEl.remove();
      appendMessage("error", "Request failed: " + e.message);
    }

    setLoading(false);
  }

  function handleKey(e) {
    // Enter sends, Shift+Enter is newline
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── UI helpers ────────────────────────────────────────────────────────────

  function appendMessage(type, text) {
    const window = document.getElementById("chat-window");
    const div = document.createElement("div");
    div.className = "message " + type;
    div.textContent = text;
    window.appendChild(div);
    window.scrollTop = window.scrollHeight;
    return div;
  }

  function clearChat() {
    document.getElementById("chat-window").innerHTML = "";
  }

  function setLoading(loading) {
    document.getElementById("send-btn").disabled = loading;
    document.getElementById("user-input").disabled = loading;
  }

  function formatResponse(text) {
    // Keep it plain text — the agent already formats with markdown-style text
    return text;
  }

  // ── Boot ─────────────────────────────────────────────────────────────────
  initSession();
</script>

</body>
</html>
